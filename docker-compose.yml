services:
  app:
    container_name: app_karaoke_query
    build: .
    ports:
      - '3000:3000'
    env_file:
      - .env
    environment:
      - NODE_ENV=production
    depends_on:
      - meilisearch
      - redis
  redis:
    container_name: redis_karaoke_query
    image: redis:alpine
    ports:
      - '$REDIS_PORT:6379'
    command: redis-server --requirepass ${REDIS_PASSWORD}
    env_file:
      - .env
    volumes:
      - redis_cache:/data
  meilisearch:
    container_name: meilisearch_karaoke_query
    image: getmeili/meilisearch:latest
    ports:
      - '7700:7700'
    volumes:
      - meili_data:/meili_data
    environment:
      - MEILI_ENV=production
      - MEILI_MASTER_KEY=${MEILI_MASTER_KEY}
      - MEILI_NO_ANALYTICS=true
      - MEILI_HTTP_ADDR=0.0.0.0:7700
      - MEILI_MAX_INDEXING_MEMORY=10GB
volumes:
  meili_data:
    name: meili_data
  redis_cache:
    name: redis_cache
    driver: local