services:
  app:
    container_name: app_karaoke_query
    build: .
    image: kidilias/karaokequery:latest
    ports:
      - '3000:3000'
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - NUXT_MEILI_HOST=${MEILI_HOST}
      - NUXT_MEILI_MASTER_KEY=${MEILI_MASTER_KEY}
      # Ultrastar-Anbindung
      - NUXT_ULTRASTAR_API_BASE=${ULTRASTAR_API_BASE}
      - NUXT_ULTRASTAR_CLIENT_ID=${ULTRASTAR_CLIENT_ID}
      - NUXT_SING_SCENE_PLAYER_DATA_DTO=${SING_SCENE_PLAYER_DATA_DTO}
      # Feature-Flag Queue (public)
      - NUXT_PUBLIC_USE_QUEUE=true
    volumes:
      # songlist.json wird zur Laufzeit gelesen (befüllt den 'karaoke'-Index)
      # und liegt bewusst nicht im Image, da gitignored.
      - ./songlist.json:/app/songlist.json:ro
    depends_on:
      - meilisearch

  meilisearch:
    container_name: meilisearch_karaoke_query
    image: getmeili/meilisearch:latest
    # Kein Host-Port noetig: Meilisearch ist nur intern (ueber das App-Backend)
    # erreichbar. Fuer Debugging ggf. temporaer '7700:7700' ergaenzen.
    expose:
      - '7700'
    volumes:
      - meili_data:/meili_data
    environment:
      - MEILI_ENV=production
      - MEILI_MASTER_KEY=${MEILI_MASTER_KEY}
      - MEILI_NO_ANALYTICS=true
      - MEILI_HTTP_ADDR=0.0.0.0:7700
      - MEILI_MAX_INDEXING_MEMORY=10GB
volumes:
  meili_data:
    name: meili_data